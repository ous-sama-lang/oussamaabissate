
    <!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Login</title><style>body{font-family:'Segoe UI',sans-serif;background:#1e1e1e;color:#d4d4d4;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}.login-container{background:#2d2d2d;padding:40px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,0.5);width:350px}h2{color:#569cd6;text-align:center;margin-bottom:25px}input[type="text"],input[type="password"]{width:100%;padding:12px;margin-bottom:15px;background:#3c3c3c;border:1px solid #555;border-radius:5px;color:#d4d4d4;box-sizing:border-box}button{width:100%;padding:12px;background:#007acc;color:white;border:none;border-radius:5px;cursor:pointer;font-size:16px}.error{color:#dc3545;text-align:center;margin-top:15px}</style></head><body><div class="login-container"><h2>Admin Panel Login</h2><form method="post"><input type="text" name="username" placeholder="Username" required><input type="password" name="password" placeholder="Password" required><button type="submit">Log In</button></form></div></body></html>
